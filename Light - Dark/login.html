<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Light - Dark</title>
</head>
<body>
    <div class="contenedor">
        <div class="fondo-redondeado"></div>
        <div class="envoltura-formulario">
            <div class="envoltura-formulario-izquierda">
                <div class="sol-luna"></div>
                <button type="button">
                    <span class="fondo"></span>
                    <span class="dia">Dia</span>
                    <span class="noche">Noche</span>
                </button>
            </div>
            <div class="envoltura-formulario-derecha">
                <h1>Contacto</h1>
                <input type="text" class="campo" placeholder="Ingresa tu campo">

                <input type="text" class="campo" placeholder="Ingresa tu email">

                <textarea class="campo msg" placeholder="Escribir mensaje"></textarea>

                <button type="button">Enviar mensaje</button>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
